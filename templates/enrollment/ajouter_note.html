{% extends "base.html" %}

{% load custom_tags %}

{% block content %}

<h2>
    Ajouter / Modifier Notes
</h2>

<h3>
    Etudiant :
    {{ module_choisi.inscription.user.username }}
</h3>

<h3>
    Module :
    {{ module_choisi.module.titre }}
</h3>

<form method="POST">

    {% csrf_token %}

    {% for categorie in categories %}

        <div style="margin-bottom:20px;">

            <label>

                {{ categorie.nom }}
                ({{ categorie.poids }}%)

            </label>

            <br>

            <input
                type="number"
                step="0.01"
                min="0"
                max="20"
                name="cat_{{ categorie.id }}"
                value="{{ notes_existantes|get_item:categorie.id }}"
            >

        </div>

    {% endfor %}

    <button type="submit">

        Enregistrer

    </button>

</form>

{% endblock %}
