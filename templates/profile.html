{% extends 'base.html' %}

{% block content %}

<style>

    .profile-card {
        border: none;
        border-radius: 24px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        overflow: hidden;
    }

    .profile-header {
        background: linear-gradient(135deg, #0d6efd, #4f8cff);
        padding: 40px;
        color: white;
        text-align: center;
    }

    .profile-avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: white;
        color: #0d6efd;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        margin: auto;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .form-section {
        padding: 35px;
    }

    .form-control {
        border-radius: 12px;
        padding: 12px;
    }

    .btn-save {
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
    }

    .section-title {
        font-weight: 700;
        margin-bottom: 25px;
    }

</style>

<div class="container py-4">

    <div class="card profile-card">

        <!-- HEADER -->

        <div class="profile-header">

            <div class="profile-avatar">

                <i class="bi bi-person-fill"></i>

            </div>

            <h2 class="fw-bold">

                {{ user.first_name }} {{ user.last_name }}

            </h2>

            <p class="mb-0">

                {{ user.email }}

            </p>

        </div>

        <!-- FORM -->

        <div class="form-section">

            <h4 class="section-title">

                <i class="bi bi-person-lines-fill text-primary"></i>

                Informations Personnelles

            </h4>

            <form method="POST">

                {% csrf_token %}

                <div class="row g-4">

                    <!-- FIRST NAME -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Prénom

                        </label>

                        <input type="text"
                               name="first_name"
                               class="form-control"
                               value="{{ user.first_name }}">

                    </div>

                    <!-- LAST NAME -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Nom

                        </label>

                        <input type="text"
                               name="last_name"
                               class="form-control"
                               value="{{ user.last_name }}">

                    </div>

                    <!-- EMAIL -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Email

                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ user.email }}">

                    </div>

                    <!-- PHONE -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Téléphone

                        </label>

                        <input type="text"
                               name="telephone"
                               class="form-control"
                               value="{{ user.profile.telephone|default:'' }}">

                    </div>

                    <!-- ROLE -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Rôle

                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ user.profile.role }}"
                               disabled>

                    </div>

                    <!-- USERNAME -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Username

                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ user.username }}"
                               disabled>

                    </div>

                    <!-- PASSWORD -->

                    <div class="col-12">

                        <label class="form-label fw-semibold">

                            Nouveau Mot de Passe

                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Laisser vide pour ne pas modifier">

                    </div>

                </div>

                <!-- BUTTON -->

                <div class="mt-4">

                    <button type="submit"
                            class="btn btn-primary btn-save w-100">

                        <i class="bi bi-save2-fill me-2"></i>

                        Enregistrer les Modifications

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
