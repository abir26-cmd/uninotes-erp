{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h3>
        Mes estimations - {{ module_choisi.module.titre }}
    </h3>

    <form method="POST">

        {% csrf_token %}

        {% for categorie in module_choisi.module.categories.all %}

            <div class="mb-3">

                <label class="form-label">

                    {{ categorie.nom }}

                </label>

                <input
                    type="number"
                    step="0.01"
                    min="0"
                    max="20"
                    name="cat_{{ categorie.id }}"
                    class="form-control"
                >

            </div>

        {% endfor %}

        <button class="btn btn-primary">

            Enregistrer
        </button>

    </form>

</div>

{% endblock %}
