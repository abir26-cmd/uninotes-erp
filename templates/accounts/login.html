{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    Login
</h1>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label>
            Username
        </label>

        <input
            type="text"
            name="username"
            class="form-control"
        >

    </div>

    <div class="mb-3">

        <label>
            Password
        </label>

        <input
            type="password"
            name="password"
            class="form-control"
        >

    </div>

    <button class="btn btn-primary">

        Login

    </button>

</form>

{% endblock %}
